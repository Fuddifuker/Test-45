<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATG Pay Premium</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background: #F8F9FB; margin: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: slideUp 0.4s ease-out forwards; }
        .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%); background-size: 200% 100%; animation: shim 3s infinite linear; }
        @keyframes shim { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INITIAL_DATA = [
            { id: "1", type: "Receive", no: "20260319190112244", amount: "299.53", upi: "7849954907@ybl", utr: "823575304308", desc: "Receive ATapllpd deduct 299.530000", transactionTime: "2026-03-19 19:01:10", balance: "40.68" },
            { id: "2", type: "Receive", no: "20260319185442032", amount: "299.15", upi: "7849954907@ybl", utr: "288779455110", desc: "Receive ATapmo6z deduct 299.150000", transactionTime: "2026-03-18 18:53:12", balance: "40.21" }
        ];

        function App() {
            const [tab, setTab] = useState('home');
            const [view, setView] = useState('main');
            const [isAdmin, setIsAdmin] = useState(false);
            const [user, setUser] = useState(() => {
                const s = localStorage.getItem('atg_u');
                return s ? JSON.parse(s) : { phone: '7849954907', balance: 40.68, id: "50006770", level: "LV2" };
            });
            const [tokens, setTokens] = useState(() => {
                const s = localStorage.getItem('atg_t');
                return s ? JSON.parse(s) : INITIAL_DATA;
            });
            const [editItem, setEditItem] = useState(null);
            const timer = useRef(null);

            useEffect(() => { localStorage.setItem('atg_u', JSON.stringify(user)); }, [user]);
            useEffect(() => { localStorage.setItem('atg_t', JSON.stringify(tokens)); }, [tokens]);

            const holdStart = () => { timer.current = setTimeout(() => setIsAdmin(true), 3000); };
            const holdEnd = () => { clearTimeout(timer.current); };

            if (view === 'history') return (
                <div className="min-h-screen bg-white animate-up">
                    <div className="p-4 border-b flex items-center sticky top-0 bg-white z-10">
                        <button onClick={() => setView('main')} className="text-[#5e2d91] text-xl font-bold p-2">←</button>
                        <h2 className="flex-1 text-center font-bold text-gray-800 pr-8">Token History</h2>
                    </div>
                    <div className="p-4 space-y-6 pb-20">
                        {tokens.map(t => (
                            <div key={t.id} className="border-b border-gray-100 pb-4">
                                <span className="bg-pink-100 text-pink-600 text-[10px] font-black px-2 py-0.5 rounded uppercase">{t.type}</span>
                                <div className="mt-3 space-y-1 text-sm">
                                    <div className="flex justify-between"> <span className="text-gray-400">Amount</span> <span className="text-[#5e2d91] font-bold">₹{t.amount}</span> </div>
                                    <div className="flex justify-between"> <span className="text-gray-400">UTR</span> <span className="text-gray-700">{t.utr}</span> </div>
                                    <div className="flex justify-between"> <span className="text-gray-400">Time</span> <span className="text-gray-500">{t.transactionTime}</span> </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 relative">
                    {/* ADMIN OVERLAY */}
                    {isAdmin && (
                        <div className="fixed inset-0 z-[100] bg-black text-white p-6 overflow-y-auto">
                            <div className="flex justify-between mb-6 border-b border-white/20 pb-4">
                                <h2 className="font-black text-purple-400 italic">ADMIN PANEL</h2>
                                <button onClick={() => setIsAdmin(false)} className="bg-red-600 px-3 py-1 rounded text-[10px] font-bold">CLOSE</button>
                            </div>
                            <div className="space-y-4 mb-8">
                                <label className="text-[10px] text-gray-500 block uppercase">Global Balance</label>
                                <input className="w-full bg-white/10 p-3 rounded" type="number" value={user.balance} onChange={e => setUser({...user, balance: parseFloat(e.target.value)})} />
                            </div>
                            <h3 className="text-[10px] text-gray-500 uppercase mb-4">Edit Tokens</h3>
                            <div className="space-y-3">
                                {tokens.map(t => (
                                    <div key={t.id} className="bg-white/5 p-3 rounded flex justify-between items-center">
                                        <div className="text-[10px]">UTR: {t.utr} | ₹{t.amount}</div>
                                        <button onClick={() => setEditItem(t)} className="bg-purple-600 px-3 py-1 rounded text-[10px]">EDIT</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* TOKEN MODAL */}
                    {editItem && (
                        <div className="fixed inset-0 z-[200] bg-[#0a0a0a] text-white p-6">
                            <h3 className="font-bold mb-4">Edit Entry</h3>
                            <div className="space-y-4 overflow-y-auto max-h-[80vh]">
                                {Object.keys(editItem).filter(k => k !== 'id').map(k => (
                                    <div key={k}>
                                        <label className="text-[10px] text-gray-400 uppercase">{k}</label>
                                        <input className="w-full bg-white/10 p-2 rounded text-sm" value={editItem[k]} onChange={e => setEditItem({...editItem, [k]: e.target.value})} />
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => { setTokens(tokens.map(t => t.id === editItem.id ? editItem : t)); setEditItem(null); }} className="w-full bg-green-600 py-4 mt-6 rounded-xl font-bold">SAVE CHANGES</button>
                        </div>
                    )}

                    {/* UI TABS */}
                    {tab === 'home' ? (
                        <div className="p-5 pt-10 animate-up space-y-6">
                            <h1 className="text-2xl font-black text-[#5e2d91] italic">ATG pay</h1>
                            <div className="bg-gradient-to-br from-[#ac7cfb] to-[#5e2d91] rounded-[32px] p-8 text-white shadow-2xl relative overflow-hidden">
                                <div className="shimmer absolute inset-0 opacity-20"></div>
                                <span className="text-[10px] font-black uppercase opacity-60">Balance</span>
                                <h2 className="text-4xl font-black italic mt-1">₹ {user.balance.toFixed(2)}</h2>
                                <div className="mt-8 bg-black/10 h-1.5 rounded-full"><div className="bg-white w-1/4 h-full rounded-full"></div></div>
                                <p className="text-center text-[10px] font-bold mt-3 text-yellow-300 uppercase">LV2 CORE USER ⚡</p>
                            </div>
                            <div className="bg-white rounded-[32px] p-2 shadow-xl grid grid-cols-2 divide-x divide-gray-50 border border-white">
                                <div className="p-6 text-center"> <p className="text-[10px] text-gray-400 uppercase font-black">Assets</p> <p className="text-lg font-black text-[#5e2d91]">₹{user.balance.toFixed(0)}</p> </div>
                                <div className="p-6 text-center"> <p className="text-[10px] text-gray-400 uppercase font-black">Income</p> <p className="text-lg font-black text-[#5e2d91]">₹0.00</p> </div>
                            </div>
                        </div>
                    ) : (
                        <div className="animate-up">
                            <div className="bg-[#f0e6ff] p-8 pt-16 rounded-b-[48px] shadow-sm">
                                <div className="flex items-center space-x-4 mb-8">
                                    <div className="w-16 h-16 bg-[#5e2d91] rounded-2xl flex items-center justify-center text-white font-black text-2xl italic shadow-lg">A</div>
                                    <div>
                                        <div className="text-[#5e2d91] font-black text-2xl italic">{user.phone}</div>
                                        <p onMouseDown={holdStart} onMouseUp={holdEnd} onTouchStart={holdStart} onTouchEnd={holdEnd} className="text-[10px] text-[#5e2d91]/50 font-black uppercase tracking-widest cursor-pointer select-none">ID: {user.id}</p>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-[28px] shadow-xl flex justify-between items-center">
                                    <div> <p className="text-gray-400 text-[10px] font-black uppercase">Wallet</p> <p className="text-3xl font-black text-[#5e2d91] italic">₹{user.balance.toFixed(2)}</p> </div>
                                    <div className="bg-[#5e2d91] text-white p-3 rounded-xl shadow-lg">⚡</div>
                                </div>
                            </div>
                            <div className="p-6 space-y-4">
                                <div onClick={() => setView('history')} className="bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                                    <span className="text-[#5e2d91] font-black text-sm uppercase">📜 Token History</span>
                                    <span className="text-gray-300">→</span>
                                </div>
                                <div className="bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center opacity-50">
                                    <span className="text-[#5e2d91] font-black text-sm uppercase">👥 Network Data</span>
                                    <span className="text-gray-300">→</span>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-md border-t flex justify-around py-4 pb-8">
                        <button onClick={() => setTab('home')} className={`flex flex-col items-center ${tab === 'home' ? 'opacity-100' : 'opacity-20'}`}>
                            <span className="text-xl">🏠</span> <span className="text-[9px] font-black uppercase">Home</span>
                        </button>
                        <button onClick={() => setTab('me')} className={`flex flex-col items-center ${tab === 'me' ? 'opacity-100' : 'opacity-20'}`}>
                            <span className="text-xl">👤</span> <span className="text-[9px] font-black uppercase">Me</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
