<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATG Pay | Me</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0c29; background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e); min-height: 100vh; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .white-card { background: white; color: #333; }
        .banner-purple { background: linear-gradient(90deg, #7c5cfc 0%, #6343cb 100%); }
        .nav-active { color: #5e2d91; }
        .nav-inactive { color: #999; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideIn 0.4s ease-out forwards; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INITIAL_TOKENS = [
            { id: "t1", type: "Receive", no: "20260319190112244", amount: "299.53", upi: "7849954907@ybl", utr: "823575304308", desc: "Receive ATapllpd deduct 299.530000", transactionTime: "2026-03-19 19:01:10", balance: "40.68" },
            { id: "t2", type: "Receive", no: "20260319185442032", amount: "299.15", upi: "7849954907@ybl", utr: "288779455110", desc: "Receive ATapmo6z deduct 299.150000", transactionTime: "2026-03-18 18:53:12", balance: "40.21" }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('me');
            const [view, setView] = useState('main');
            const [showAdmin, setShowAdmin] = useState(false);
            const [user, setUser] = useState(() => {
                const s = localStorage.getItem('atg_final_user');
                return s ? JSON.parse(s) : { phone: '7849954907', balance: 40.68, id: "50006770", level: "LV2" };
            });
            const [tokens, setTokens] = useState(() => {
                const s = localStorage.getItem('atg_final_tokens');
                return s ? JSON.parse(s) : INITIAL_TOKENS;
            });
            const [editingItem, setEditingItem] = useState(null);
            const timerRef = useRef(null);

            useEffect(() => { localStorage.setItem('atg_final_user', JSON.stringify(user)); }, [user]);
            useEffect(() => { localStorage.setItem('atg_final_tokens', JSON.stringify(tokens)); }, [tokens]);

            const startHold = () => { timerRef.current = setTimeout(() => setShowAdmin(true), 3000); };
            const endHold = () => { clearTimeout(timerRef.current); };

            const MenuItem = ({ icon, label, rightText, onClick, isRed }) => (
                <div onClick={onClick} className="flex items-center justify-between p-4 border-b border-gray-50 last:border-0 active:bg-gray-50 transition-colors cursor-pointer">
                    <div className="flex items-center space-x-3">
                        <span className="text-xl opacity-70">{icon}</span>
                        <span className={`text-[15px] font-medium ${isRed ? 'text-red-500' : 'text-gray-800'}`}>{label}</span>
                    </div>
                    <div className="flex items-center space-x-2 text-gray-400">
                        {rightText && <span className="text-[14px]">{rightText}</span>}
                        <span className="text-lg">›</span>
                    </div>
                </div>
            );

            if (view === 'history') return (
                <div className="min-h-screen bg-[#0f0c29] animate-slide pb-20">
                    <div className="p-5 flex items-center border-b border-white/10 sticky top-0 bg-[#0f0c29]/90 backdrop-blur-xl z-50">
                        <button onClick={() => setView('main')} className="w-10 h-10 glass rounded-full flex items-center justify-center text-xl">←</button>
                        <h2 className="flex-1 text-center font-bold text-lg pr-10">Token History</h2>
                    </div>
                    <div className="p-4 space-y-4">
                        {tokens.map(t => (
                            <div key={t.id} className="glass p-5 rounded-[24px] border border-white/5">
                                <div className="flex justify-between items-center mb-3">
                                    <span className="text-[10px] font-black bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full uppercase tracking-widest">{t.type}</span>
                                    <span className="text-[10px] opacity-40">{t.transactionTime}</span>
                                </div>
                                <div className="space-y-2">
                                    <div className="flex justify-between text-xs"><span className="opacity-50">Amount</span><span className="font-bold text-blue-400">₹{t.amount}</span></div>
                                    <div className="flex justify-between text-xs"><span className="opacity-50">UTR</span><span className="font-medium">{t.utr}</span></div>
                                    <div className="flex justify-between text-xs"><span className="opacity-50">Balance</span><span className="text-green-400">₹{t.balance}</span></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen relative bg-white pb-24 text-gray-900">
                    {/* MASTER ADMIN */}
                    {showAdmin && (
                        <div className="fixed inset-0 z-[200] bg-black text-white p-6 overflow-y-auto pb-40">
                            <h2 className="text-xl font-black italic text-purple-400 mb-6 border-b border-white/10 pb-4">EDITOR MODE</h2>
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] opacity-50 uppercase font-bold block mb-2">Main Balance</label>
                                    <input className="w-full bg-white/10 p-3 rounded-xl" type="number" value={user.balance} onChange={e => setUser({...user, balance: parseFloat(e.target.value)})} />
                                </div>
                                <h3 className="text-[10px] opacity-50 uppercase font-bold border-t border-white/10 pt-4">Edit Tokens</h3>
                                {tokens.map(t => (
                                    <div key={t.id} className="bg-white/5 p-4 rounded-xl flex justify-between items-center">
                                        <div className="text-[10px]"><p className="text-blue-300">{t.utr}</p><p>₹{t.amount}</p></div>
                                        <button onClick={() => setEditingItem(t)} className="bg-purple-600 px-4 py-2 rounded-lg text-[10px] font-bold">EDIT</button>
                                    </div>
                                ))}
                                <button onClick={() => setShowAdmin(false)} className="w-full bg-red-600 py-4 rounded-2xl font-bold uppercase mt-10">Exit Master Mode</button>
                            </div>
                        </div>
                    )}

                    {/* ITEM EDITOR */}
                    {editingItem && (
                        <div className="fixed inset-0 z-[300] bg-[#050505] text-white p-6 overflow-y-auto">
                            <h3 className="text-xl font-bold mb-6">Edit Record</h3>
                            <div className="space-y-4">
                                {Object.keys(editingItem).filter(k => k !== 'id').map(k => (
                                    <div key={k}>
                                        <label className="text-[10px] opacity-40 uppercase block mb-1">{k}</label>
                                        <input className="w-full bg-white/10 p-3 rounded-xl text-sm" value={editingItem[k]} onChange={e => setEditingItem({...editingItem, [k]: e.target.value})} />
                                    </div>
                                ))}
                                <button onClick={() => { setTokens(tokens.map(t => t.id === editingItem.id ? editingItem : t)); setEditingItem(null); }} className="w-full bg-green-600 py-4 rounded-xl font-bold mt-4">Save & Close</button>
                            </div>
                        </div>
                    )}

                    {/* TOP HEADER */}
                    <div className="p-6 pt-10">
                        <div className="flex items-center justify-between mb-2">
                            <div className="flex items-center space-x-2 text-[#5e2d91] font-bold">
                                <span>👤</span>
                                <span className="text-lg">Edit profile</span>
                                <span className="text-xs">▾</span>
                            </div>
                        </div>
                        <p 
                            onMouseDown={startHold} onMouseUp={endHold} onTouchStart={startHold} onTouchEnd={endHold}
                            className="text-[#5e2d91] font-semibold text-[15px] mb-8 select-none cursor-pointer"
                        >
                            ID: {user.id}
                        </p>

                        <div className="flex items-baseline space-x-1 mb-1">
                            <span className="text-[#5e2d91] opacity-60 text-xs">⚲</span>
                            <span className="text-[#5e2d91] font-bold text-xs">Quota</span>
                        </div>
                        
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-baseline">
                                <span className="text-[44px] font-black text-[#5e2d91] tracking-tighter">{user.balance.toFixed(2)}</span>
                                <span className="text-[#5e2d91] font-bold text-sm ml-2">INR</span>
                            </div>
                            <button className="bg-[#5e2d91] text-white px-8 py-2.5 rounded-full font-bold text-sm shadow-lg active:scale-95 transition-transform">Top up</button>
                        </div>
                        <p className="text-gray-400 text-sm mb-8">Reward ratio 0%</p>

                        {/* PURPLE BANNER */}
                        <div className="banner-purple rounded-2xl p-5 relative overflow-hidden shadow-xl mb-8">
                            <div className="relative z-10">
                                <h3 className="text-white font-bold text-lg leading-tight">Refer & get rewarded</h3>
                                <p className="text-white/80 text-[15px]">Grow a team.</p>
                                <p className="text-white/80 text-[15px]">Grow your income</p>
                            </div>
                            <div className="absolute right-0 top-0 h-full w-1/3 flex items-center justify-center opacity-30">
                                <div className="w-16 h-16 border-4 border-white rounded-full flex items-center justify-center">✓</div>
                            </div>
                        </div>

                        {/* MENU LIST */}
                        <div className="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden mb-12">
                            <MenuItem icon="⏰" label="Recharge History" />
                            <MenuItem icon="📄" label="Token History" onClick={() => setView('history')} />
                            <MenuItem icon="🌐" label="Languages" rightText="English" />
                            <MenuItem icon="✳️" label="Google Authentication" />
                            <MenuItem icon="💬" label="Contact Us" />
                            <MenuItem icon="↳" label="Sign Out" isRed={true} />
                        </div>
                    </div>

                    {/* FLOATING CHAT */}
                    <div className="fixed bottom-24 right-6 z-[100] animate-bounce-slow">
                        <div className="w-16 h-16 bg-[#3a1c71] rounded-full shadow-2xl flex items-center justify-center border-4 border-white/5 active:scale-90 transition-transform">
                            <div className="w-6 h-6 bg-white rounded-full rounded-tr-none"></div>
                        </div>
                    </div>

                    {/* NAVIGATION BAR */}
                    <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 flex justify-around items-center pt-3 pb-8 z-50">
                        <div onClick={() => setActiveTab('home')} className="flex flex-col items-center opacity-40">
                            <span className="text-2xl">🏠</span>
                            <span className="text-[10px] mt-1 font-bold">Home</span>
                        </div>
                        <div className="flex flex-col items-center opacity-40">
                            <span className="text-2xl">💳</span>
                            <span className="text-[10px] mt-1 font-bold">Payment</span>
                        </div>
                        <div className="flex flex-col items-center opacity-40">
                            <span className="text-2xl">💼</span>
                            <span className="text-[10px] mt-1 font-bold">UPI</span>
                        </div>
                        <div className="flex flex-col items-center opacity-40">
                            <span className="text-2xl">👥</span>
                            <span className="text-[10px] mt-1 font-bold">Team</span>
                        </div>
                        <div onClick={() => setActiveTab('me')} className="flex flex-col items-center text-[#5e2d91]">
                            <span className="text-2xl">👤</span>
                            <span className="text-[10px] mt-1 font-black">Me</span>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
